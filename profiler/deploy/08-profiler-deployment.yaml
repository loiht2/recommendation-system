apiVersion: apps/v1
kind: Deployment
metadata:
  name: vgpu-profiler
  namespace: profiler
  labels:
    app: vgpu-profiler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vgpu-profiler
  template:
    metadata:
      labels:
        app: vgpu-profiler
    spec:
      serviceAccountName: vgpu-profiler
      initContainers:
        - name: wait-for-db
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z profiler-postgresql.profiler.svc.cluster.local 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done'
      containers:
        - name: profiler
          image: docker.io/loihoangthanh1411/profiler:v1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: health
          envFrom:
            - configMapRef:
                name: profiler-config
            - secretRef:
                name: profiler-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      restartPolicy: Always
