apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommender
  namespace: profiler
  labels:
    app: recommender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommender
  template:
    metadata:
      labels:
        app: recommender
    spec:
      initContainers:
        - name: wait-for-db
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - 'until nc -z profiler-postgresql.profiler.svc.cluster.local 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done'
      containers:
        - name: recommender
          image: docker.io/loihoangthanh1411/recommender:v1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: recommender-config
            - secretRef:
                name: profiler-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      restartPolicy: Always
